name: Testing task
description: Task kiểm thử theo REQ / test case
title: "test: "
labels: ["testing"]
body:
  - type: input
    id: req
    attributes:
      label: REQ ID
      placeholder: REQ-AUTH-01
    validations:
      required: true
  - type: input
    id: testcase
    attributes:
      label: Test case ID
      placeholder: TC-BB-AUTH-07
  - type: textarea
    id: description
    attributes:
      label: Mô tả
      description: Kỹ thuật (EP/BVA/Selenium/...) và tiêu chí hoàn thành
    validations:
      required: true
