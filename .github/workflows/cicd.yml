name: Deploy Node Application

on:
  push:
    branches:
      - aws-production-env

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to docker hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t nguyen1976/trello-web .

      - name: Public Image to Docker Hub
        run: docker push nguyen1976/trello-web:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Stop old container
        run: |
          docker stop reactjs-app-container || true
          docker rm reactjs-app-container || true
      - name: Pull image from docker hub
        run: docker pull nguyen1976/trello-web:latest

      - name: Run Docker Container
        run: docker run -d -p 5173:80 --name reactjs-app-container nguyen1976/trello-web
